name: Ctrld Sync

on:
  schedule:
    # Runs automatically once a day at 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout latest repository code
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.repository.default_branch }}
        fetch-depth: 1

    - name: Set up latest Python environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Control D Sync Script
      env:
        TOKEN: ${{ secrets.CONTROLD_TOKEN }}
        PROFILE: ${{ secrets.CONTROLD_PROFILE }}
      run: |
        chmod +x control_d_sync.py
        python control_d_sync.py